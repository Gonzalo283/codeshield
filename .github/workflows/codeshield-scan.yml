name: CodeShield Security Scan

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write

jobs:
  codeshield-scan:
    name: CodeShield.ai Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run CodeShield Scanner
        id: scan
        env:
          CODESHIELD_API_KEY: ${{ secrets.CODESHIELD_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Download and run the CodeShield CLI scanner
          # For now, use the API endpoint directly
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"

          echo "Scanning ${REPO_OWNER}/${REPO_NAME}..."

          # Scan files locally using pattern matching
          SCAN_RESULTS=$(node -e "
          const fs = require('fs');
          const path = require('path');

          const patterns = [
            { regex: /(?:password|passwd|secret)\\s*[:=]\\s*['\"][^'\"]{4,}['\"]/gi, severity: 'critical', title: 'Hardcoded Secret', category: 'secrets' },
            { regex: /\\bsk_(?:live|test)_[a-zA-Z0-9]{20,}/g, severity: 'critical', title: 'Stripe Key Exposed', category: 'secrets' },
            { regex: /\\bghp_[a-zA-Z0-9]{36,}/g, severity: 'critical', title: 'GitHub Token Exposed', category: 'secrets' },
            { regex: /\\bAIza[0-9A-Za-z_-]{35}/g, severity: 'critical', title: 'Google API Key Exposed', category: 'secrets' },
            { regex: /-----BEGIN\\s+(?:RSA\\s+)?PRIVATE\\s+KEY-----/g, severity: 'critical', title: 'Private Key in Code', category: 'secrets' },
            { regex: /\\beval\\s*\\(/g, severity: 'critical', title: 'eval() Usage', category: 'code-injection' },
            { regex: /\\bRSA\\b.*?(?:encrypt|decrypt|sign|verify|key|generate)/gi, severity: 'critical', title: 'RSA (Quantum-Vulnerable)', category: 'pqc' },
            { regex: /\\b(ECDSA|ECDH|Ed25519|X25519)\\b/g, severity: 'high', title: 'ECC (Quantum-Vulnerable)', category: 'pqc' },
            { regex: /\\b(sha-?1|SHA1)\\b|createHash\\s*\\(\\s*['\"]sha1['\"]\\)/gi, severity: 'medium', title: 'SHA-1 Usage', category: 'weak-crypto' },
            { regex: /\\.innerHTML\\s*=\\s*(?!['\"]<)/g, severity: 'high', title: 'Potential XSS', category: 'xss' },
            { regex: /['\"]Access-Control-Allow-Origin['\"]\\s*[:,]\\s*['\"]?\\s*\\*\\s*['\"]?/gi, severity: 'medium', title: 'CORS Wildcard', category: 'cors' },
          ];

          const exts = new Set(['.ts','.tsx','.js','.jsx','.py','.go','.java','.rs','.rb','.php']);
          const excluded = ['node_modules','dist','build','.next','.git','vendor','__pycache__'];

          function walk(dir) {
            let files = [];
            try {
              for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
                const full = path.join(dir, entry.name);
                if (entry.isDirectory() && !excluded.includes(entry.name)) {
                  files = files.concat(walk(full));
                } else if (entry.isFile() && exts.has(path.extname(entry.name))) {
                  files.push(full);
                }
              }
            } catch {}
            return files;
          }

          const files = walk('.');
          const results = { critical: 0, high: 0, medium: 0, total: 0, findings: [] };

          for (const file of files) {
            const content = fs.readFileSync(file, 'utf-8');
            const lines = content.split('\\n');
            for (const p of patterns) {
              for (let i = 0; i < lines.length; i++) {
                p.regex.lastIndex = 0;
                if (p.regex.test(lines[i])) {
                  results[p.severity]++;
                  results.total++;
                  results.findings.push({ file: file.replace('./', ''), line: i+1, severity: p.severity, title: p.title, category: p.category });
                }
              }
            }
          }

          console.log(JSON.stringify(results));
          " 2>/dev/null)

          echo "scan_results<<EOF" >> $GITHUB_OUTPUT
          echo "$SCAN_RESULTS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # Parse for exit code
          CRITICAL=$(echo "$SCAN_RESULTS" | node -e "const d=require('fs').readFileSync(0,'utf-8');const r=JSON.parse(d);console.log(r.critical)" 2>/dev/null || echo "0")
          echo "critical_count=$CRITICAL" >> $GITHUB_OUTPUT
          echo "Scan complete. Critical: $CRITICAL"

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const scanResults = JSON.parse(`${{ steps.scan.outputs.scan_results }}`);
            const { critical, high, medium, total, findings } = scanResults;

            let body = `## CodeShield.ai Security Scan Results\n\n`;

            if (total === 0) {
              body += `No vulnerabilities detected. Your code looks secure.\n`;
            } else {
              body += `| Severity | Count |\n|----------|-------|\n`;
              if (critical > 0) body += `| **CRITICAL** | ${critical} |\n`;
              if (high > 0) body += `| HIGH | ${high} |\n`;
              if (medium > 0) body += `| MEDIUM | ${medium} |\n`;
              body += `| **Total** | **${total}** |\n\n`;

              const topFindings = findings.slice(0, 10);
              body += `### Top Findings\n\n`;
              for (const f of topFindings) {
                const icon = f.severity === 'critical' ? '🔴' : f.severity === 'high' ? '🟠' : '🔵';
                body += `${icon} **${f.title}** (${f.severity.toUpperCase()}) — \`${f.file}:${f.line}\`\n`;
              }
              if (findings.length > 10) {
                body += `\n_...and ${findings.length - 10} more findings._\n`;
              }

              body += `\n---\n`;
              body += `[View full report on CodeShield.ai](https://codeshield.ai/dashboard) | `;
              body += `[Get auto-fix with AI](https://codeshield.ai/pricing)\n`;
            }

            body += `\n_Scanned by [CodeShield.ai](https://codeshield.ai) — The only platform that makes AI code quantum-safe._`;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.includes('CodeShield.ai Security Scan'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail on critical
        if: steps.scan.outputs.critical_count != '0'
        run: |
          echo "Critical vulnerabilities found. Failing the check."
          exit 1
